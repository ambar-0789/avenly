<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avenly — Set Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Lexend&display=swap" rel="stylesheet">  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">
        <div class="blob-mini" aria-hidden="true">
          <div class="bm-body">
            <span class="bm-eye"></span>
            <span class="bm-eye"></span>
          </div>
        </div>
        <span class="brand-name">Avenly</span>
      </div>
    </header>

    <main class="main">
      <div class="card">
        <div class="card-left">
          <h1 class="heading">Sign in!</h1>
          <p class="sub">Join the community today!</p>
        </div>
        <div class="card-right">
          <p class="field-label">Please set your password</p>
          <input class="input" type="password" id="pw" placeholder="Password" autocomplete="new-password" />
          <input class="input" type="password" id="pwc" placeholder="Confirm Password" autocomplete="new-password" />
          <button class="btn" id="confirmBtn">Confirm</button>
          <p class="error" id="err"></p>
        </div>
      </div>
    </main>

    <div class="scallop" aria-hidden="true"></div>
  </div>

  <script>
    if (!sessionStorage.getItem('av_email')) window.location.href = 'signin1.html';

    document.getElementById('confirmBtn').addEventListener('click', () => {
      const pw  = document.getElementById('pw').value;
      const pwc = document.getElementById('pwc').value;
      const err = document.getElementById('err');

      if (!pw || !pwc) {
        err.textContent = 'Please fill in both fields.';
        return;
      }

      if (pw.length < 6) {
        err.textContent = 'Password must be at least 6 characters.';
        return;
      }

      if (pw !== pwc) {
        err.textContent = 'Passwords do not match.';
        return;
      }

      sessionStorage.setItem('av_authed', '1');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
