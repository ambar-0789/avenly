<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avenly — Verify OTP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lexend&display=swap" rel="stylesheet">  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">
        <div class="blob-mini" aria-hidden="true">
          <div class="bm-body">
            <span class="bm-eye"></span>
            <span class="bm-eye"></span>
          </div>
        </div>
        <span class="brand-name">Avenly</span>
      </div>
    </header>

    <main class="main">
      <div class="card">
        <div class="card-left">
          <h1 class="heading">Sign in!</h1>
          <p class="sub">Join the community today!</p>
        </div>
        <div class="card-right">
          <p class="field-label">Enter the OTP sent to your email/SMS</p>
          <input class="input" type="text" id="otp" placeholder="OTP" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
          <button class="btn" id="verifyBtn">Verify!</button>
          <p class="error" id="err"></p>
        </div>
      </div>
    </main>

    <div class="scallop" aria-hidden="true"></div>
  </div>

  <script>
    if (!sessionStorage.getItem('av_email')) window.location.href = 'signin1.html';

    document.getElementById('verifyBtn').addEventListener('click', () => {
      const otp = document.getElementById('otp').value.trim();
      const err = document.getElementById('err');

      if (!otp) {
        err.textContent = 'Please enter the OTP.';
        return;
      }

      window.location.href = 'signin3.html';
    });
  </script>
</body>
</html>
